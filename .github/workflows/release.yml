name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install fonts-liberation
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build assets
        run: make

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/qrfont-1L.ttf
            dist/qrfont-2L.ttf
            dist/qrfont-3L.ttf
            dist/index.html
            dist/favicon.ico
